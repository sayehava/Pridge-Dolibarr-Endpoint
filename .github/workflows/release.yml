name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify module version matches tag
        run: |
          declared=$(grep -oP "MODULE_VERSION = '\K[^']+" class/pridgeclient.class.php)
          if [ "$declared" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match MODULE_VERSION ($declared) in class/pridgeclient.class.php"
            exit 1
          fi

      - name: Extract release notes from CHANGELOG.md
        run: |
          awk -v ver="${{ steps.version.outputs.version }}" '
            $0 == "## [" ver "]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No '## [${{ steps.version.outputs.version }}]' section found in CHANGELOG.md. Add one before tagging a release."
            exit 1
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
